# Experience
experience:
  enable: true
  title: "Skúsenosti"
  subtitle: "pracovné, ale aj školské"
  items:
    - job: "👨‍💻 Senior Software Engineer"
      company: "Slido (Cisco)"
      companyUrl: "https://slido.com"
      date: "2014 – súčasnosť"
      info:
        enable: false
      content: |
        Aktuálne pôsobím ako softvérový inžinier v spoločnosti [Slido](https://slido.com) (od roku 2021 súčasť [Cisco](https://cisco.com)), kde sa zameriavam na vývoj natívnych aplikácií a integrácií pre operačné systémy macOS (Swift) a Windows (C#). Pri svojej práci však využívam aj webové technológie (najmä jazyk TypeScript a frameworky React a Node.js).

    - job: "👨‍💻 Software & Hardware Engineer"
      company: "Matsuko"
      companyUrl: "https://matsuko.com"
      date: "2012 – 2016"
      info:
        enable: false
      content: |-
        Počas môjho pôsobenia som sa podieľal na viacerých softvérových aj hardvérových projektoch pre rôznych klientov. 

        V oblasti softvéru som vyvíjal multiplatformové mobilné aplikácie pre Android, iOS a Windows Phone, pričom som využíval framework [Xamarin](https://dotnet.microsoft.com/en-us/apps/xamarin) a programovací jazyk C#.

        Čo sa týka hardvéru, venoval som sa návrhu zariadení na mieru, najmä pre rôzne dočasné inštalácie a exhibície. Mal som na starosti návrh plošných spojov v prostredí [EAGLE](https://en.wikipedia.org/wiki/EAGLE_(program)), programovanie mikrokontrolérov (Atmel AVR) a následnú integráciu hardvéru so softvérom.

    - job: "👨‍🎓 Študent"
      company: "FEI STU"
      companyUrl: "https://www.fei.stuba.sk"
      date: "2008 – 2013"
      info:
        enable: false
      content: |-
        Bakalárske a inžinierske štúdium som úspešne absolvoval na Fakulte elektrotechniky a informatiky Slovenskej technickej univerzity v Bratislave, v odbore [aplikovaná informatika](https://www.fei.stuba.sk/sk/chcem-studovat-na-feike/studijne-programy/aplikovana-informatika.html?page_id=6278) so špecializáciou na modelovanie a simuláciu udalostných systémov.

        Počas štúdia som bol akívnym členom združenia [Ynet](https://www.ynet.sk/sk/), kde som pomáhal so správou internetovej siete a sieťového laboratória na internátoch [ŠD Mladosť](https://ubytovanieastravovanie.stuba.sk/sd-mladost) v Mlynskej doline.

