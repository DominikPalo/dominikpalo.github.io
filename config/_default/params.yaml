# Projects
projects:
  enable: true
  title: "Portfólio"
  subtitle: "projekty, na ktorých som sa podieľal alebo sa stále podieľam"
  items:
    - title: Slido for PowerPoint
      content: |
        Integrácia, ktorá umožňuje vkladať ankety, kvízy, prieskumy alebo Q&A priamo do PowerPoint prezentácií a automaticky ich spúšťať počas prezentovania.

        Toto je projekt, ktorému aktuálne venujem 90% môjho pracovného času. Primárne mám na starosti vývoj integrácie pre operačný systém macOS, kde využívam jazyky Swift, C, C++ a dokonca aj [VBA](https://sk.wikipedia.org/wiki/Visual_Basic_for_Applications). Pomáham ale aj pri vývoji integrácie pre Windows (.NET/C#) a jej frontendu (React/TypeScript).
      image: /images/projects/slido-ppi.jpg
      featured:
        name: 🚀 Vyskúšať
        link: https://www.slido.com/powerpoint
      badges:
        - "Swift"
        - "C#"
        - "C/C++"
        - "TypeScript"
        - "React"
    - title: Slido for Google Slides
      content: |-
        Integrácia, ktorá umožňuje vkladať ankety, kvízy, prieskumy alebo Q&A priamo do Google Slides prezentácií a automaticky ich spúšťať počas prezentovania. Pozostáva z viacerých prepojených komponentov ([rozšírenie pre Google Chrome](https://chromewebstore.google.com/detail/slido/dhhclfjehmpacimcdknijodpjpmppkii?pli=1), [doplnok pre Google Slides](https://workspace.google.com/marketplace/app/slido_for_google_slides/240609050747), vlastný webový prehrávač a tzv. Slido Sidebar).

        V počiatočných fázach projektu som sa podielaľ na vývoji rozšírenia pre prehliadač Google Chrome a tiež doplnku pre Google Slides. Neskôr vznikol okolo integrácie samostatný tím, ktorý prácu kompletne prevzal.
      image: /images/projects/slido-gsi.jpg
      featured:
        name: 🚀 Vyskúšať
        link: https://www.slido.com/google-slides
      badges:
        - "TypeScript"
        - "React"
        - "Google Cloud"
    - title: Slido Switcher (2017 – 2025)
      content: |-
        8 rokov som mal na starosti vývoj natívnych aplikácií pre operačné systémy Windows a macOS, ktoré slúžili na vzdialené ovládanie počítača priamo z administrátorského rozhrania Slido. To umožňovalo počas prezentácie plynulo prechádzať medzi Slido interakciami a prezentovaným obsahom.

        Aplikácie boli postupne [nahradené](https://community.slido.com/news-announcements-3/slido-s-switcher-app-was-sunsetted-in-january-2025-4416) samostatnými integráciami [Slido for PowerPoint](https://www.slido.com/powerpoint) a [Slido for Google Slides](https://www.slido.com/google-slides), ktoré umožňujú ešte hlbšiu integráciu a širšie možnosti automatizácie.
      image: /images/projects/slido-switcher.png
      badges:
        - "Swift"
        - "C#"
        - "WPF"
    - title: Slido for Slack (2018 – 2020)
      content: |-
        Integrácia Slida so Slackom umožňovala vytvárať a spravovať Slido eventy, ako aj klásť otázky priamo v prostredí Slacku. Aj keď mala pomerne úspešnú [kampaň na ProductHunt-e](https://www.producthunt.com/p/slido/slido-for-slack), počas svojho „života“ si nenašla dostatok používateľov, a preto bol jej vývoj po dvoch rokoch [ukončený](https://community.slido.com/news-announcements-3/sunsetting-slido-s-slack-integration-here-s-why-and-what-s-next-619).

        Pri tejto integrácii som implementoval backend (Node.js/TypeScript), databázu (MySQL) a tiež logiku interakcií so [Slack API](https://api.slack.com/).
      image: /images/projects/slido-slack.png
      badges:
        - "TypeScript"
        - "NodeJS"
        - "MySQL"
        - "hapi.js"
        - "Slack API"
    - title: "Mobilná aplikácia na ovládanie zariadení pripojených k platforme Arduino (diplomová práca)"
      content: |-
        Vyberám z abstraktu: „Práca sa zaoberá návrhom a implementáciou systému umožnujucého pomocou mobilnej aplikácie ovládať zariadenia a monitorovať rôzne veličiny v domácnosti. Okrem možnosti manuálneho ovládania, systém podporuje aj základnú automatizáciu domácnosti na princípe používateľom definovaných pravidiel.“

        V dnešnej dobe IoT sú podobné aplikácie a platformy samozrejmosťou, no v roku 2013 to bola pomerne novinka, za ktorú som získal aj ocenenie dekana.
      image: /images/projects/diplomova-praca.png
      badges:
        - "Arduino"
        - "Apache Cordova"
        - "JavaScript"
        - "HTML/CSS"
        - "Node.js"
        - "CouchDB"

